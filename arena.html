<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FaithChess — Arena</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  main { padding: 0; }

  .arena-wrap {
    display: flex;
    min-height: calc(100vh - 64px);
  }

  /* ── List panel ── */
  .arena-list-panel {
    width: 300px;
    flex-shrink: 0;
    background: linear-gradient(180deg, var(--bg2), var(--bg3));
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .arena-list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 18px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .arena-list-title { font-size: 16px; font-weight: 700; color: var(--text2); }

  .btn-create {
    padding: 7px 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .15s;
  }
  .btn-create:hover { opacity: .85; }

  .tournament-list {
    overflow-y: auto;
    flex: 1;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .t-card {
    padding: 12px 14px;
    background: var(--bg4);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .t-card:hover, .t-card.selected { border-color: var(--accent); background: rgba(165,148,192,.08); }
  .t-card-name  { font-size: 14px; font-weight: 700; color: var(--text2); margin-bottom: 6px; }
  .t-card-meta  { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .t-card-info  { font-size: 11px; color: var(--muted); }

  .status-badge {
    font-size: 10px; font-weight: 700; letter-spacing: .5px;
    padding: 2px 7px; border-radius: 20px; text-transform: uppercase;
  }
  .status-badge.waiting  { background: rgba(165,148,192,.15); color: var(--accent); border: 1px solid rgba(165,148,192,.3); }
  .status-badge.active   { background: rgba(76,175,125,.15);  color: #4caf7d;       border: 1px solid rgba(76,175,125,.3); }
  .status-badge.finished { background: rgba(99,95,88,.15);    color: var(--muted);  border: 1px solid var(--border); }

  /* ── Detail panel ── */
  .arena-detail-panel {
    flex: 1;
    overflow-y: auto;
    padding: 32px 36px;
  }

  .detail-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    min-height: 400px;
    color: var(--muted);
    gap: 12px;
  }
  .detail-placeholder-icon { font-size: 48px; }
  .detail-placeholder-text { font-size: 14px; }

  .detail-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 24px;
    gap: 16px;
  }

  .detail-title  { font-size: 26px; font-weight: 700; color: var(--text2); margin-bottom: 8px; }
  .detail-badges { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .detail-badge  {
    font-size: 11px; color: var(--muted);
    background: var(--bg4); border: 1px solid var(--border);
    padding: 3px 10px; border-radius: 20px;
  }

  .detail-actions { display: flex; gap: 8px; flex-shrink: 0; }

  .btn-action {
    padding: 10px 20px;
    border: none; border-radius: 8px;
    font-family: 'Outfit', sans-serif;
    font-size: 14px; font-weight: 700;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
  }
  .btn-action:hover          { opacity: .85; }
  .btn-action:active         { transform: scale(.97); }
  .btn-action:disabled       { opacity: .4; cursor: not-allowed; }
  .btn-action.primary        { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
  .btn-action.danger         { background: rgba(224,92,92,.15); color: #e05c5c; border: 1px solid rgba(224,92,92,.3); }
  .btn-action.secondary      { background: var(--bg4); color: var(--text2); border: 1px solid var(--border); }
  .btn-action.success        { background: rgba(76,175,125,.15); color: #4caf7d; border: 1px solid rgba(76,175,125,.3); }

  /* ── Countdown ── */
  .countdown-bar {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .countdown-label { font-size: 13px; color: var(--muted); font-weight: 600; }
  .countdown-time  { font-size: 22px; font-weight: 700; color: var(--text2); font-variant-numeric: tabular-nums; }
  .countdown-time.low { color: #e05c5c; }

  /* ── Queue status ── */
  .queue-status-bar {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
  }
  .queue-status-bar.searching {
    color: #4caf7d;
    border-color: rgba(76,175,125,.3);
    background: rgba(76,175,125,.06);
    animation: pulse-text 1.5s infinite;
  }
  @keyframes pulse-text { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }

  /* ── Player join list ── */
  .section-title {
    font-size: 11px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: .8px; margin-bottom: 10px;
  }

  .player-join-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 24px; }
  .player-join-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    background: var(--bg4); border: 1px solid var(--border); border-radius: 8px;
    font-size: 13px; color: var(--text2);
  }
  .player-join-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0;
  }

  /* ── Leaderboard ── */
  .leaderboard { width: 100%; border-collapse: collapse; }
  .leaderboard th {
    text-align: left; font-size: 11px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: .7px;
    padding: 8px 12px; border-bottom: 1px solid var(--border);
  }
  .leaderboard td {
    padding: 10px 12px; font-size: 13px; color: var(--text2);
    border-bottom: 1px solid rgba(255,255,255,.03);
  }
  .leaderboard tr:hover td { background: rgba(255,255,255,.02); }
  .lb-rank         { font-weight: 700; color: var(--muted); width: 40px; }
  .lb-rank.gold    { color: #f0c040; }
  .lb-rank.silver  { color: #aaaaaa; }
  .lb-rank.bronze  { color: #d4956a; }
  .lb-score        { font-weight: 700; color: var(--accent); font-size: 15px; }
  .lb-you          { font-size: 11px; color: var(--muted); margin-left: 6px; }
  .lb-wdl          { color: var(--muted); font-size: 12px; }

  /* ── Create modal ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.65);
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.hidden { display: none; }

  .modal-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 32px;
    min-width: 340px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .modal-title    { font-size: 18px; font-weight: 700; color: var(--text2); }

  .form-group     { display: flex; flex-direction: column; gap: 6px; }
  .form-label     { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }

  .form-input, .form-select {
    padding: 10px 12px;
    background: var(--bg4); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text2);
    font-family: 'Outfit', sans-serif; font-size: 14px;
    outline: none; transition: border-color .15s;
  }
  .form-input:focus, .form-select:focus { border-color: var(--accent); }
  .form-select option { background: var(--bg3); }

  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

  .empty-list { text-align: center; color: var(--muted); font-size: 13px; padding: 32px 16px; }
</style>
</head>
<body>
<header></header>

<main>
  <div class="arena-wrap">

    <!-- Left: tournament list -->
    <div class="arena-list-panel">
      <div class="arena-list-header">
        <span class="arena-list-title">♟ Arena</span>
        <button class="btn-create" id="createBtn">+ Create</button>
      </div>
      <div class="tournament-list" id="tournamentList">
        <div class="empty-list">Loading...</div>
      </div>
    </div>

    <!-- Right: detail -->
    <div class="arena-detail-panel" id="detailPanel">
      <div class="detail-placeholder">
        <div class="detail-placeholder-icon">♟</div>
        <div class="detail-placeholder-text">Select a tournament to view details</div>
      </div>
    </div>

  </div>
</main>

<!-- Create modal -->
<div class="modal-overlay hidden" id="createModal">
  <div class="modal-box">
    <div class="modal-title">Create Arena Tournament</div>
    <div class="form-group">
      <label class="form-label">Name</label>
      <input class="form-input" id="tName" placeholder="e.g. Sunday Blitz Arena" maxlength="40" />
    </div>
    <div class="form-group">
      <label class="form-label">Time Control</label>
      <select class="form-select" id="tTc">
        <option value="bullet">Bullet (1+0)</option>
        <option value="blitz" selected>Blitz (5+0)</option>
        <option value="rapid">Rapid (10+0)</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Duration</label>
      <select class="form-select" id="tDuration">
        <option value="15">15 minutes</option>
        <option value="30" selected>30 minutes</option>
        <option value="60">1 hour</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-action secondary" id="createCancelBtn">Cancel</button>
      <button class="btn-action primary"   id="createSubmitBtn">Create</button>
    </div>
  </div>
</div>

<script src="nav.js"></script>
<script type="module" src="auth.js"></script>
<script type="module" src="challenges.js"></script>
<script src="settings.js"></script>

<script type="module">
  import { getDatabase, ref, get, set, push, onValue, runTransaction, remove, onDisconnect }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getAuth, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { initializeApp, getApps }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAUdXVlmN9xhhIzubK0MTtGO3hA9JkHClA",
    authDomain: "faithchess.firebaseapp.com",
    databaseURL: "https://faithchess-default-rtdb.firebaseio.com",
    projectId: "faithchess",
    storageBucket: "faithchess.firebasestorage.app",
    messagingSenderId: "132292001988",
    appId: "1:132292001988:web:3c9b7227f1b09766b48991"
  };

  const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  const auth = getAuth(app);

  const TC_LABELS = { bullet: "Bullet · 1+0", blitz: "Blitz · 5+0", rapid: "Rapid · 10+0" };
  const TC_SECS   = { bullet: 60, blitz: 300, rapid: 600 };

  let myUid      = null;
  let myUsername = null;

  let selectedId       = null;
  let detailUnsub      = null;
  let countdownInterval = null;
  let myQueueRef       = null;
  let isSearching      = false;
  let matchUnsub       = null;

  // ── Auth ──────────────────────────────────────────────────────────────────
  onAuthStateChanged(auth, async user => {
    if (!user) { window.location.href = "login.html"; return; }
    const snap = await get(ref(db, `users/${user.uid}/username`));
    myUid      = user.uid;
    myUsername = snap.val() || user.email;
    loadList();
  });

  // ── Tournament list ───────────────────────────────────────────────────────
  function loadList() {
    onValue(ref(db, "tournaments"), snap => {
      const listEl = document.getElementById("tournamentList");
      const data   = snap.val();

      if (!data) {
        listEl.innerHTML = `<div class="empty-list">No tournaments yet.<br>Create one to get started!</div>`;
        return;
      }

      const ORDER = { active: 0, waiting: 1, finished: 2 };
      const items  = Object.entries(data)
        .map(([id, t]) => ({ id, ...t }))
        .sort((a, b) => (ORDER[a.status] ?? 3) - (ORDER[b.status] ?? 3)
                     || (b.createdAt || 0) - (a.createdAt || 0));

      listEl.innerHTML = "";
      for (const t of items) {
        const count = t.players ? Object.keys(t.players).length : 0;
        const card  = document.createElement("div");
        card.className  = `t-card${t.id === selectedId ? " selected" : ""}`;
        card.dataset.id = t.id;
        card.innerHTML  = `
          <div class="t-card-name">${t.name || "Arena"}</div>
          <div class="t-card-meta">
            <span class="status-badge ${t.status}">${t.status}</span>
            <span class="t-card-info">${TC_LABELS[t.timeControl] || t.timeControl} · ${t.durationMinutes}min · ${count}p</span>
          </div>
        `;
        card.onclick = () => selectTournament(t.id);
        listEl.appendChild(card);
      }
    });
  }

  // ── Select ────────────────────────────────────────────────────────────────
  function selectTournament(id) {
    if (detailUnsub) { detailUnsub(); detailUnsub = null; }
    if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }

    selectedId = id;
    document.querySelectorAll(".t-card").forEach(c =>
      c.classList.toggle("selected", c.dataset.id === id));

    detailUnsub = onValue(ref(db, `tournaments/${id}`), snap => {
      const t = snap.val();
      if (t) renderDetail(id, t);
    });
  }

  // ── Render detail ─────────────────────────────────────────────────────────
  function renderDetail(id, t) {
    if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }

    const players    = t.players ? Object.entries(t.players).map(([uid, p]) => ({ uid, ...p })) : [];
    const isJoined   = players.some(p => p.uid === myUid);
    const isCreator  = t.createdBy === myUid;
    const count      = players.length;
    const searching  = isSearching && selectedId === id;

    // ── Actions ──
    let actionsHTML = "";
    if (t.status === "waiting") {
      if (!isJoined) {
        actionsHTML = `<button class="btn-action primary" id="joinBtn">Join</button>`;
      } else if (isCreator) {
        actionsHTML = `
          <button class="btn-action success" id="startBtn">Start</button>
          <button class="btn-action danger"  id="leaveBtn">Leave</button>
        `;
      } else {
        actionsHTML = `<button class="btn-action danger" id="leaveBtn">Leave</button>`;
      }
    } else if (t.status === "active") {
      if (!isJoined) {
        actionsHTML = `<button class="btn-action primary" id="joinBtn">Join</button>`;
      } else if (searching) {
        actionsHTML = `<button class="btn-action danger" id="cancelSearchBtn">Cancel</button>`;
      } else {
        actionsHTML = `<button class="btn-action primary" id="findBtn">Find Opponent</button>`;
      }
    }

    // ── Countdown ──
    let countdownHTML = "";
    if (t.status === "active" && t.endAt) {
      countdownHTML = `
        <div class="countdown-bar">
          <span class="countdown-label">Time remaining</span>
          <span class="countdown-time" id="countdownEl">—</span>
        </div>
      `;
    }

    // ── Queue status ──
    let queueHTML = "";
    if (t.status === "active" && isJoined) {
      queueHTML = `<div class="queue-status-bar${searching ? " searching" : ""}" id="arenaQueueStatus">
        ${searching ? "Searching for opponent..." : 'Click "Find Opponent" to play a game'}
      </div>`;
    }

    // ── Body ──
    let bodyHTML = "";
    if (t.status === "waiting") {
      const playerItems = players.map(p => `
        <div class="player-join-item">
          <div class="player-join-avatar">${(p.username || "?")[0].toUpperCase()}</div>
          <span>${p.username}${p.uid === myUid ? `<span class="lb-you">(You)</span>` : ""}${p.uid === t.createdBy ? `<span class="lb-you">creator</span>` : ""}</span>
        </div>
      `).join("");
      bodyHTML = `
        <div class="section-title">Players (${count})</div>
        <div class="player-join-list">${playerItems || `<div style="color:var(--muted);font-size:13px;padding:8px 0;">No players yet</div>`}</div>
      `;
    } else {
      bodyHTML = renderLeaderboard(players, t.status === "active");
    }

    document.getElementById("detailPanel").innerHTML = `
      <div class="detail-header">
        <div>
          <div class="detail-title">${t.name || "Arena"}</div>
          <div class="detail-badges">
            <span class="status-badge ${t.status}">${t.status}</span>
            <span class="detail-badge">${TC_LABELS[t.timeControl] || t.timeControl}</span>
            <span class="detail-badge">${t.durationMinutes} min</span>
            <span class="detail-badge">${count} player${count !== 1 ? "s" : ""}</span>
          </div>
        </div>
        <div class="detail-actions">${actionsHTML}</div>
      </div>
      ${countdownHTML}
      ${queueHTML}
      ${bodyHTML}
    `;

    // Wire buttons
    document.getElementById("joinBtn")?.addEventListener("click", () => joinTournament(id));
    document.getElementById("leaveBtn")?.addEventListener("click", () => leaveTournament(id));
    document.getElementById("startBtn")?.addEventListener("click", () => startTournament(id, t.durationMinutes));
    document.getElementById("findBtn")?.addEventListener("click", () => findOpponent(id, t.timeControl));
    document.getElementById("cancelSearchBtn")?.addEventListener("click", () => cancelSearch(id));

    // Countdown ticker
    if (t.status === "active" && t.endAt) {
      const el = document.getElementById("countdownEl");
      const tick = () => {
        const rem = Math.max(0, t.endAt - Date.now());
        const m   = Math.floor(rem / 60000);
        const s   = Math.floor((rem % 60000) / 1000);
        if (el) {
          el.textContent = `${m}:${String(s).padStart(2, "0")}`;
          el.className   = `countdown-time${rem < 60000 ? " low" : ""}`;
        }
        if (rem <= 0) {
          clearInterval(countdownInterval);
          countdownInterval = null;
          endTournament(id);
        }
      };
      tick();
      countdownInterval = setInterval(tick, 1000);
    }
  }

  function renderLeaderboard(players, live) {
    if (!players.length) return `<div style="color:var(--muted);font-size:13px;padding:16px 0;">No players yet</div>`;

    const sorted = [...players].sort((a, b) =>
      (b.score || 0) - (a.score || 0) || (b.wins || 0) - (a.wins || 0));

    const rows = sorted.map((p, i) => {
      const rank      = i + 1;
      const rankClass = rank === 1 ? "gold" : rank === 2 ? "silver" : rank === 3 ? "bronze" : "";
      return `
        <tr>
          <td class="lb-rank ${rankClass}">#${rank}</td>
          <td>${p.username}${p.uid === myUid ? `<span class="lb-you">(You)</span>` : ""}</td>
          <td class="lb-score">${p.score || 0}</td>
          <td class="lb-wdl">${p.wins || 0}W / ${p.draws || 0}D / ${p.losses || 0}L</td>
          <td class="lb-wdl">${p.gamesPlayed || 0} games</td>
        </tr>
      `;
    }).join("");

    return `
      <div class="section-title">${live ? "Live Leaderboard" : "Final Standings"}</div>
      <table class="leaderboard">
        <thead><tr><th>#</th><th>Player</th><th>Score</th><th>W/D/L</th><th>Games</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  // ── Join ──────────────────────────────────────────────────────────────────
  async function joinTournament(id) {
    await set(ref(db, `tournaments/${id}/players/${myUid}`), {
      username:    myUsername,
      score:       0,
      wins:        0,
      draws:       0,
      losses:      0,
      gamesPlayed: 0,
      joinedAt:    Date.now(),
    });
  }

  // ── Leave ─────────────────────────────────────────────────────────────────
  async function leaveTournament(id) {
    cancelSearch(id);
    await set(ref(db, `tournaments/${id}/players/${myUid}`), null);
  }

  // ── Start ─────────────────────────────────────────────────────────────────
  async function startTournament(id, durationMinutes) {
    const endAt = Date.now() + durationMinutes * 60 * 1000;
    await Promise.all([
      set(ref(db, `tournaments/${id}/status`),  "active"),
      set(ref(db, `tournaments/${id}/startAt`), Date.now()),
      set(ref(db, `tournaments/${id}/endAt`),   endAt),
    ]);
  }

  // ── End (countdown expires) ───────────────────────────────────────────────
  async function endTournament(id) {
    const snap = await get(ref(db, `tournaments/${id}/status`));
    if (snap.val() === "active") await set(ref(db, `tournaments/${id}/status`), "finished");
  }

  // ── Find opponent ─────────────────────────────────────────────────────────
  function findOpponent(id, tc) {
    if (isSearching) return;
    isSearching = true;

    // Update UI immediately
    const actions = document.querySelector(".detail-actions");
    if (actions) {
      actions.innerHTML = `<button class="btn-action danger" id="cancelSearchBtn">Cancel</button>`;
      document.getElementById("cancelSearchBtn").addEventListener("click", () => cancelSearch(id));
    }
    const status = document.getElementById("arenaQueueStatus");
    if (status) { status.textContent = "Searching for opponent..."; status.className = "queue-status-bar searching"; }

    myQueueRef = ref(db, `tournaments/${id}/queue/${myUid}`);
    set(myQueueRef, { uid: myUid, username: myUsername, joinedAt: Date.now() });
    onDisconnect(myQueueRef).remove();

    tryMatch(id, tc);

    // Listen for match assignment
    matchUnsub = onValue(ref(db, `tournaments/${id}/matches/${myUid}`), snap => {
      if (!snap.exists()) return;
      const gameId = snap.val();
      if (matchUnsub) { matchUnsub(); matchUnsub = null; }
      set(ref(db, `tournaments/${id}/matches/${myUid}`), null);
      isSearching = false;
      window.location.href = `play.html?tournament=${id}`;
    });
  }

  function tryMatch(id, tc) {
    let matched = null;

    runTransaction(ref(db, `tournaments/${id}/queue`), queue => {
      if (!queue) return queue;
      const entries = Object.values(queue).filter(e => e.uid !== myUid);
      if (entries.length === 0) return queue;
      entries.sort((a, b) => a.joinedAt - b.joinedAt);
      matched = entries[0];
      delete queue[myUid];
      delete queue[matched.uid];
      return queue;
    }).then(result => {
      if (!result.committed || !matched) return;
      createTournamentGame(id, tc, myUid, myUsername, matched.uid, matched.username);
    });
  }

  async function createTournamentGame(tournamentId, tc, whiteUid, whiteUsername, blackUid, blackUsername) {
    const gameRef = push(ref(db, "games"));
    const gameId  = gameRef.key;
    const secs    = TC_SECS[tc] ?? 600;

    await set(gameRef, {
      white:        { uid: whiteUid, username: whiteUsername },
      black:        { uid: blackUid, username: blackUsername },
      fen:          "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1",
      moves:        [],
      status:       "playing",
      timeControl:  tc,
      whiteTime:    secs,
      blackTime:    secs,
      createdAt:    Date.now(),
      tournamentId: tournamentId,
    });

    // Set currentGame FIRST so play.html finds it on load
    await Promise.all([
      set(ref(db, `users/${whiteUid}/currentGame`), gameId),
      set(ref(db, `users/${blackUid}/currentGame`), gameId),
    ]);

    // Then notify both players (triggers redirect)
    await Promise.all([
      set(ref(db, `tournaments/${tournamentId}/matches/${whiteUid}`), gameId),
      set(ref(db, `tournaments/${tournamentId}/matches/${blackUid}`), gameId),
    ]);
  }

  // ── Cancel search ─────────────────────────────────────────────────────────
  function cancelSearch(id) {
    isSearching = false;
    if (myQueueRef) { remove(myQueueRef); myQueueRef = null; }
    if (matchUnsub) { matchUnsub(); matchUnsub = null; }
    // Refresh detail
    get(ref(db, `tournaments/${id}`)).then(snap => { if (snap.val()) renderDetail(id, snap.val()); });
  }

  // ── Create modal ──────────────────────────────────────────────────────────
  document.getElementById("createBtn").onclick = () =>
    document.getElementById("createModal").classList.remove("hidden");

  document.getElementById("createCancelBtn").onclick = () =>
    document.getElementById("createModal").classList.add("hidden");

  document.getElementById("createModal").onclick = e => {
    if (e.target === e.currentTarget) document.getElementById("createModal").classList.add("hidden");
  };

  document.getElementById("createSubmitBtn").onclick = async () => {
    const name     = document.getElementById("tName").value.trim();
    const tc       = document.getElementById("tTc").value;
    const duration = parseInt(document.getElementById("tDuration").value);
    if (!name) { document.getElementById("tName").focus(); return; }

    const btn = document.getElementById("createSubmitBtn");
    btn.disabled    = true;
    btn.textContent = "Creating...";

    const tRef = push(ref(db, "tournaments"));
    await set(tRef, {
      name,
      timeControl:     tc,
      durationMinutes: duration,
      status:          "waiting",
      createdBy:       myUid,
      creatorUsername: myUsername,
      createdAt:       Date.now(),
      startAt:         null,
      endAt:           null,
    });

    // Auto-join as creator
    await set(ref(db, `tournaments/${tRef.key}/players/${myUid}`), {
      username:    myUsername,
      score:       0,
      wins:        0,
      draws:       0,
      losses:      0,
      gamesPlayed: 0,
      joinedAt:    Date.now(),
    });

    document.getElementById("createModal").classList.add("hidden");
    document.getElementById("tName").value = "";
    btn.disabled    = false;
    btn.textContent = "Create";
    selectTournament(tRef.key);
  };
</script>
</body>
</html>
