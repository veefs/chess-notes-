<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FaithChess — Log In</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header></header>

<main>
  <div class="auth-wrap">
    <div class="auth-box">
      <h2 class="auth-title">Welcome back</h2>
      <p class="auth-sub">Log in to your FaithChess account</p>
      <div class="auth-field">
        <label>Email</label>
        <input type="email" id="emailInput" placeholder="you@example.com" />
      </div>
      <div class="auth-field">
        <label>Password</label>
        <input type="password" id="passwordInput" placeholder="••••••••" />
      </div>
      <div id="authError" class="auth-error hidden"></div>
      <button class="auth-btn" id="loginBtn">Log In</button>
      <p class="auth-switch">Don't have an account? <a href="signup.html">Sign Up</a></p>
    </div>
  </div>
</main>

<script src="nav.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const app = initializeApp({
    apiKey: "AIzaSyAUdXVlmN9xhhIzubK0MTtGO3hA9JkHClA",
    authDomain: "faithchess.firebaseapp.com",
    databaseURL: "https://faithchess-default-rtdb.firebaseio.com",
    projectId: "faithchess",
    storageBucket: "faithchess.firebasestorage.app",
    messagingSenderId: "132292001988",
    appId: "1:132292001988:web:3c9b7227f1b09766b48991"
  });

  const auth = getAuth(app);

  document.getElementById("loginBtn").onclick = async () => {
    const email = document.getElementById("emailInput").value.trim();
    const password = document.getElementById("passwordInput").value;
    const errEl = document.getElementById("authError");
    errEl.classList.add("hidden");
    try {
      await signInWithEmailAndPassword(auth, email, password);
      window.location.href = "index.html";
    } catch (err) {
      errEl.textContent = friendlyError(err.code);
      errEl.classList.remove("hidden");
    }
  };

  function friendlyError(code) {
    if (code === "auth/user-not-found") return "No account with that email.";
    if (code === "auth/wrong-password") return "Incorrect password.";
    if (code === "auth/invalid-email") return "Invalid email address.";
    if (code === "auth/too-many-requests") return "Too many attempts. Try again later.";
    return "Something went wrong. Please try again.";
  }
</script>

</body>
</html>
