<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FaithChess — Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
<style>
  .profile-wrap { max-width: 960px; margin: 40px auto; padding: 0 24px; display: grid; grid-template-columns: 280px 1fr; gap: 24px; align-items: start; }
  .profile-card { background: linear-gradient(145deg, var(--bg2), var(--bg3)); border: 1px solid var(--border); border-radius: 12px; padding: 28px 24px; display: flex; flex-direction: column; align-items: center; gap: 14px; position: sticky; top: 24px; overflow: hidden; }
  .avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 700; color: #fff; }
  .profile-username { font-size: 22px; font-weight: 700; color: var(--text2); }
  .title-badge { display: inline-block; padding: 2px 10px; border-radius: 4px; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
  .title-dev  { background: #001a12; color: #74ebcb; border: 1px solid #74ebcb; }
  .title-gm   { background: #b8860b; color: #fff8dc; }
  .title-im   { background: #555; color: #e8e8e8; }
  .title-fm   { background: #8b4513; color: #ffe4c4; }
  .title-cm   { background: #2a5f2a; color: #c8f0c8; }
  .title-nm   { background: #1a4a6b; color: #c8e8f8; }
  .title-mod  { background: #c0392b; color: #ffe0e0; }
  .rating-badge { background: var(--bg4); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 18px; font-weight: 700; color: var(--accent); }
  .profile-rating { font-size: 13px; color: var(--muted); }
  .profile-stats { width: 100%; display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
  .stat-row { display: flex; justify-content: space-between; padding: 8px 12px; background: var(--bg4); border-radius: 8px; font-size: 13px; color: var(--muted); }
  .stat-row b { color: var(--text2); font-weight: 600; }
  .stat-win { color: #4caf7d; } .stat-loss { color: #e05c5c; } .stat-draw { color: var(--muted); }
  .friends-section { width: 100%; margin-top: 8px; }
  .section-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .friend-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04); cursor: pointer; }
  .friend-item:hover .friend-name { color: var(--accent); }
  .friend-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--accent2), var(--accent3)); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .friend-name { font-size: 13px; font-weight: 600; color: var(--text2); transition: color .2s; }
  .friend-rating { font-size: 11px; color: var(--muted); }
  .add-friend-wrap { display: flex; gap: 8px; margin-top: 12px; width: 100%; box-sizing: border-box; }
  .add-friend-input { min-width: 0; flex: 1; padding: 7px 10px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text2); font-family: 'Outfit', sans-serif; font-size: 13px; outline: none; }
  .add-friend-input:focus { border-color: var(--accent); }
  .add-friend-btn { padding: 7px 12px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity .2s; }
  .add-friend-btn:hover { opacity: .8; }
  .profile-right { display: flex; flex-direction: column; gap: 20px; }
  .panel { background: linear-gradient(145deg, var(--bg2), var(--bg3)); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; }
  .panel-header { font-size: 14px; font-weight: 700; color: var(--text2); margin-bottom: 16px; }
  .game-list { display: flex; flex-direction: column; gap: 8px; }
  .game-entry { display: grid; grid-template-columns: 48px 1fr auto auto; align-items: center; gap: 12px; padding: 10px 14px; background: var(--bg4); border-radius: 8px; font-size: 13px; border-left: 3px solid transparent; cursor: pointer; transition: opacity .15s; }
  .game-entry:hover { opacity: .8; }
  .game-entry.win  { border-left-color: #4caf7d; } .game-entry.loss { border-left-color: #e05c5c; } .game-entry.draw { border-left-color: var(--muted); }
  .game-result { font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: .5px; }
  .game-entry.win  .game-result { color: #4caf7d; } .game-entry.loss .game-result { color: #e05c5c; } .game-entry.draw .game-result { color: var(--muted); }
  .game-opponent { color: var(--text2); font-weight: 600; } .game-meta { color: var(--muted); font-size: 11px; } .game-moves { color: var(--muted); font-size: 11px; text-align: right; }
  .game-rating-change { font-size: 12px; font-weight: 600; text-align: right; min-width: 36px; }
  .game-entry.win  .game-rating-change { color: #4caf7d; } .game-entry.loss .game-rating-change { color: #e05c5c; } .game-entry.draw .game-rating-change { color: var(--muted); }
  .empty-state { text-align: center; color: var(--muted); font-size: 13px; padding: 24px 0; }
  .loading-text { color: var(--muted); font-size: 13px; text-align: center; padding: 20px 0; }
  .request-item { display: flex; flex-direction: column; gap: 6px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .request-label { font-size: 12px; color: var(--accent); font-weight: 700; }
  .request-actions { display: flex; gap: 8px; }
  .btn-accept { padding: 4px 10px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-family: 'Outfit', sans-serif; font-size: 11px; font-weight: 600; cursor: pointer; }
  .btn-decline { padding: 4px 10px; background: var(--bg4); color: var(--muted); border: none; border-radius: var(--radius); font-family: 'Outfit', sans-serif; font-size: 11px; font-weight: 600; cursor: pointer; }

  /* ── Challenge button ── */
  .challenge-btn {
    display: flex; align-items: center; gap: 8px; padding: 10px 20px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; border: none; border-radius: var(--radius);
    font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: opacity .2s, transform .1s;
    width: 100%; justify-content: center; letter-spacing: .3px;
  }
  .challenge-btn:hover  { opacity: .88; }
  .challenge-btn:active { transform: scale(.97); }
  .challenge-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  /* ── Other profile banner ── */
  .other-profile-banner {
    display: flex; align-items: center; gap: 10px; padding: 10px 16px;
    background: var(--bg4); border: 1px solid var(--border);
    border-radius: var(--radius); font-size: 13px; color: var(--muted);
    margin-bottom: 4px; width: 100%;
  }
  .other-profile-banner a {
    color: var(--accent); text-decoration: none; font-weight: 600;
    margin-left: auto; font-size: 12px;
  }
  .other-profile-banner a:hover { text-decoration: underline; }

  /* ── Game viewer modal ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .modal-overlay.hidden { display: none; }
  .modal-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 24px; width: 420px; max-width: 95vw; display: flex; flex-direction: column; gap: 16px; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; }
  .modal-title { font-size: 14px; font-weight: 700; color: var(--text2); }
  .modal-close { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; line-height: 1; padding: 0; }
  .modal-close:hover { color: var(--text2); }
  .modal-controls { display: flex; align-items: center; justify-content: center; gap: 10px; }
  .ctrl-btn { background: var(--bg4); border: 1px solid var(--border); color: var(--text2); border-radius: 6px; padding: 6px 14px; font-size: 14px; cursor: pointer; font-family: 'Outfit', sans-serif; }
  .ctrl-btn:hover { background: var(--bg3); }
  .move-counter { font-size: 13px; color: var(--muted); min-width: 60px; text-align: center; }
  .move-list { display: flex; flex-wrap: wrap; gap: 4px; max-height: 100px; overflow-y: auto; }
  .move-pill { padding: 2px 8px; border-radius: 4px; font-size: 12px; background: var(--bg4); color: var(--muted); cursor: pointer; }
  .move-pill:hover { color: var(--text2); }
  .move-pill.active { background: var(--accent); color: #fff; }
  .move-pill.move-num { color: var(--muted); background: none; cursor: default; padding-right: 2px; }

  @media (max-width: 700px) { .profile-wrap { grid-template-columns: 1fr; } .profile-card { position: static; } }
</style>
</head>
<body>

<header></header>

<main>
  <div class="profile-wrap">
    <div class="profile-card">
      <div class="avatar" id="avatarEl">?</div>
      <div class="profile-username" id="usernameEl">Loading...</div>
      <div id="titleEl"></div>
      <div class="rating-badge" id="ratingEl">—</div>
      <div class="profile-rating">Rapid Rating</div>

      <!-- Only shown on other players' profiles -->
      <button class="challenge-btn hidden" id="challengeBtn">⚔ Challenge</button>
      <div class="other-profile-banner hidden" id="otherBanner">
        <span>Viewing another player's profile</span>
        <a href="profile.html">← My Profile</a>
      </div>

      <div class="profile-stats">
        <div class="stat-row"><span>Games Played</span><b id="statGames">—</b></div>
        <div class="stat-row"><span>Wins</span><b class="stat-win" id="statWins">—</b></div>
        <div class="stat-row"><span>Losses</span><b class="stat-loss" id="statLosses">—</b></div>
        <div class="stat-row"><span>Draws</span><b class="stat-draw" id="statDraws">—</b></div>
        <div class="stat-row"><span>Win Rate</span><b id="statWinRate">—</b></div>
      </div>

      <!-- Only shown on own profile -->
      <div class="friends-section" id="friendsSection">
        <div class="section-label">Friends</div>
        <div id="friendsList"><div class="loading-text">Loading...</div></div>
        <div class="add-friend-wrap">
          <input class="add-friend-input" id="friendInput" placeholder="Username" maxlength="32" />
          <button class="add-friend-btn" id="addFriendBtn">Add</button>
        </div>
        <div id="friendMsg" style="font-size:12px; margin-top:6px;"></div>
      </div>
    </div>

    <div class="profile-right">
      <div class="panel">
        <div class="panel-header">♟ Game History</div>
        <div class="game-list" id="gameList"><div class="loading-text">Loading games...</div></div>
      </div>
    </div>
  </div>
</main>

<!-- Game viewer modal -->
<div id="gameViewModal" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Game Review</span>
      <button class="modal-close" id="modalClose">×</button>
    </div>
    <div id="viewBoard" style="width:100%"></div>
    <div class="modal-controls">
      <button class="ctrl-btn" id="btnFirst">⏮</button>
      <button class="ctrl-btn" id="btnPrev">◀</button>
      <span class="move-counter" id="moveCounter">0 / 0</span>
      <button class="ctrl-btn" id="btnNext">▶</button>
      <button class="ctrl-btn" id="btnLast">⏭</button>
    </div>
    <div class="move-list" id="moveList"></div>
  </div>
</div>

<footer>© 2026 FaithChess — Built for everyone</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
<script src="nav.js"></script>
<script type="module" src="auth.js"></script>
<script type="module" src="challenges.js"></script>

<script type="module">
  import { getDatabase, ref, get, set, query, orderByChild, equalTo }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getAuth, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { initializeApp, getApps }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAUdXVlmN9xhhIzubK0MTtGO3hA9JkHClA",
    authDomain: "faithchess.firebaseapp.com",
    databaseURL: "https://faithchess-default-rtdb.firebaseio.com",
    projectId: "faithchess",
    storageBucket: "faithchess.firebasestorage.app",
    messagingSenderId: "132292001988",
    appId: "1:132292001988:web:3c9b7227f1b09766b48991"
  };

  const app  = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
  const db   = getDatabase(app);
  const auth = getAuth(app);

  const params       = new URLSearchParams(window.location.search);
  const viewUsername = params.get("user"); // null = own profile

  const TITLES = {
    dev: { label: "</> Developer", cls: "title-dev" },
    gm:  { label: "GM",  cls: "title-gm"  },
    im:  { label: "IM",  cls: "title-im"  },
    fm:  { label: "FM",  cls: "title-fm"  },
    cm:  { label: "CM",  cls: "title-cm"  },
    nm:  { label: "NM",  cls: "title-nm"  },
    mod: { label: "Mod", cls: "title-mod" },
  };

  onAuthStateChanged(auth, async user => {
    if (!user) { window.location.href = "login.html"; return; }

    if (viewUsername) {
      // ── Viewing someone else's profile ──────────────────────────────────
      document.getElementById("otherBanner").classList.remove("hidden");
      document.getElementById("friendsSection").style.display = "none";

      const uidSnap = await get(ref(db, `usernames/${viewUsername.toLowerCase()}`));
      if (!uidSnap.exists()) {
        document.getElementById("usernameEl").textContent = "User not found";
        document.getElementById("gameList").innerHTML =
          `<div class="empty-state">This user doesn't exist.</div>`;
        return;
      }

      const targetUid = uidSnap.val();
      if (targetUid === user.uid) { window.location.href = "profile.html"; return; }

      const [usernameSnap, ratingSnap, winsSnap, lossesSnap, drawsSnap, titleSnap, myUsernameSnap] =
        await Promise.all([
          get(ref(db, `users/${targetUid}/username`)),
          get(ref(db, `users/${targetUid}/rating`)),
          get(ref(db, `users/${targetUid}/wins`)),
          get(ref(db, `users/${targetUid}/losses`)),
          get(ref(db, `users/${targetUid}/draws`)),
          get(ref(db, `users/${targetUid}/title`)),
          get(ref(db, `users/${user.uid}/username`)),
        ]);

      const targetUsername = usernameSnap.val() || viewUsername;

      renderProfile({
        username: targetUsername,
        rating:   ratingSnap.val(),
        wins:     winsSnap.val(),
        losses:   lossesSnap.val(),
        draws:    drawsSnap.val(),
        title:    titleSnap.val(),
      });

      loadGameHistory(targetUid);

      // Challenge button — delegates to challenges.js via window.sendChallenge
      const btn = document.getElementById("challengeBtn");
      btn.classList.remove("hidden");
      btn.onclick = async () => {
        btn.disabled    = true;
        btn.textContent = "⏳ Sending...";
        await window.sendChallenge(targetUid, targetUsername);
        btn.textContent = "✓ Challenge Sent";
        setTimeout(() => {
          btn.disabled    = false;
          btn.textContent = "⚔ Challenge";
        }, 3000);
      };

    } else {
      // ── Own profile ─────────────────────────────────────────────────────
      const [usernameSnap, ratingSnap, winsSnap, lossesSnap, drawsSnap, friendsSnap, titleSnap] =
        await Promise.all([
          get(ref(db, `users/${user.uid}/username`)),
          get(ref(db, `users/${user.uid}/rating`)),
          get(ref(db, `users/${user.uid}/wins`)),
          get(ref(db, `users/${user.uid}/losses`)),
          get(ref(db, `users/${user.uid}/draws`)),
          get(ref(db, `users/${user.uid}/friends`)),
          get(ref(db, `users/${user.uid}/title`)),
        ]);

      const username = usernameSnap.val();
      const data = {
        username,
        rating:  ratingSnap.val(),
        wins:    winsSnap.val(),
        losses:  lossesSnap.val(),
        draws:   drawsSnap.val(),
        friends: friendsSnap.val() || {},
        title:   titleSnap.val() || null,
      };

      renderProfile(data);
      loadGameHistory(user.uid);
      loadFriends(user.uid, data.friends);
      setupAddFriend(user.uid, username);
    }
  });

  // ── Render profile card ─────────────────────────────────────────────────────
  function renderProfile(data) {
    const username = data.username || "Unknown";
    const rating   = data.rating  ?? 800;
    const wins     = data.wins    ?? 0;
    const losses   = data.losses  ?? 0;
    const draws    = data.draws   ?? 0;
    const total    = wins + losses + draws;
    const winRate  = total > 0 ? Math.round((wins / total) * 100) + "%" : "—";

    document.getElementById("avatarEl").textContent   = username[0].toUpperCase();
    document.getElementById("usernameEl").textContent = username;
    document.title = `FaithChess — ${username}`;

    const titleEl = document.getElementById("titleEl");
    if (data.title && TITLES[data.title]) {
      const t = TITLES[data.title];
      titleEl.innerHTML = `<span class="title-badge ${t.cls}">${t.label}</span>`;
    } else {
      titleEl.innerHTML = "";
    }

    document.getElementById("ratingEl").textContent    = rating;
    document.getElementById("statGames").textContent   = total;
    document.getElementById("statWins").textContent    = wins;
    document.getElementById("statLosses").textContent  = losses;
    document.getElementById("statDraws").textContent   = draws;
    document.getElementById("statWinRate").textContent = winRate;
  }

  // ── Game history: saved first, falls back to querying games/ node ───────────
  async function loadGameHistory(uid) {
    const listEl = document.getElementById("gameList");

    // Try saved gameHistory first (written by play.html on game end)
    const historySnap = await get(ref(db, `users/${uid}/gameHistory`));
    const savedHistory = historySnap.val();
    if (savedHistory) {
      renderGameList(Object.values(savedHistory).reverse());
      return;
    }

    // Fallback: query the games node directly
    const [asWhiteSnap, asBlackSnap] = await Promise.all([
      get(query(ref(db, "games"), orderByChild("white/uid"), equalTo(uid))),
      get(query(ref(db, "games"), orderByChild("black/uid"), equalTo(uid))),
    ]);

    const games = [];
    asWhiteSnap.forEach(s => { const d = s.val(); if (d) games.push({ ...d, _myColor: "white", _gameId: s.key }); });
    asBlackSnap.forEach(s => { const d = s.val(); if (d) games.push({ ...d, _myColor: "black", _gameId: s.key }); });

    if (games.length === 0) {
      listEl.innerHTML = `<div class="empty-state">No games yet. <a href="play.html" style="color:var(--accent)">Play now →</a></div>`;
      return;
    }

    games.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

    const mapped = games.map(g => {
      const myColor  = g._myColor;
      const opponent = myColor === "white" ? g.black : g.white;
      const moves    = g.moves ? Object.values(g.moves) : [];

      // Determine result — check winner/status fields first, fall back to chess.js
      let result = "draw";
      const status = g.status || "";

      if (g.winner) {
        result = g.winner === uid ? "win" : "loss";
      } else if (status === "white") {
        result = myColor === "white" ? "win" : "loss";
      } else if (status === "black") {
        result = myColor === "black" ? "win" : "loss";
      } else if (status === "checkmate" || status === "over") {
        const chess = new Chess();
        for (const m of moves) chess.move(m);
        if (chess.in_checkmate()) {
          const loserTurn = chess.turn();
          result = (loserTurn === "w" && myColor === "black") ||
                   (loserTurn === "b" && myColor === "white") ? "win" : "loss";
        }
      }
      // status === "playing" stays as "draw" (in progress)

      return {
        result,
        opponentUsername: opponent?.username || "Unknown",
        myColor,
        moveCount:    moves.length,
        playedAt:     g.createdAt || null,
        ratingChange: g.ratingChange ?? null,
        gameId:       g._gameId || null,
      };
    });

    renderGameList(mapped);
  }

  // ── Render game list ────────────────────────────────────────────────────────
  function renderGameList(games) {
    const listEl = document.getElementById("gameList");
    listEl.innerHTML = "";

    if (!games.length) {
      listEl.innerHTML = `<div class="empty-state">No games yet. <a href="play.html" style="color:var(--accent)">Play now →</a></div>`;
      return;
    }

    for (const g of games) {
      const entry = document.createElement("div");
      entry.className = `game-entry ${g.result}`;
      entry.innerHTML = `
        <div class="game-result">${g.result}</div>
        <div>
          <div class="game-opponent">vs ${g.opponentUsername || "Unknown"}</div>
          <div class="game-meta">${g.myColor === "white" ? "White" : "Black"} · ${g.playedAt ? new Date(g.playedAt).toLocaleDateString() : ""}</div>
        </div>
        <div class="game-moves">${g.moveCount ?? "?"} moves</div>
        <div class="game-rating-change">${g.ratingChange != null ? (g.ratingChange >= 0 ? "+" : "") + g.ratingChange : "—"}</div>
      `;
      if (g.gameId) {
        entry.onclick = () => openGameViewer(g.gameId, g.myColor, g.opponentUsername);
      }
      listEl.appendChild(entry);
    }
  }

  // ── Game viewer ─────────────────────────────────────────────────────────────
  let viewerBoard = null;
  let viewerMoves = [];
  let viewerIndex = 0;

  async function openGameViewer(gameId, myColor, opponent) {
    const snap     = await get(ref(db, `games/${gameId}/moves`));
    const movesRaw = snap.val();
    viewerMoves = movesRaw ? Object.values(movesRaw) : [];
    viewerIndex = viewerMoves.length;

    document.getElementById("modalTitle").textContent =
      `vs ${opponent} · ${myColor === "white" ? "White" : "Black"}`;
    document.getElementById("gameViewModal").classList.remove("hidden");

    if (viewerBoard) { viewerBoard.destroy(); viewerBoard = null; }
    viewerBoard = Chessboard("viewBoard", {
      position:    "start",
      pieceTheme:  "https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png",
      orientation: myColor || "white",
    });

    buildMoveList();
    goToMove(viewerMoves.length);
  }

  function goToMove(idx) {
    viewerIndex = Math.max(0, Math.min(idx, viewerMoves.length));
    const g = new Chess();
    for (let i = 0; i < viewerIndex; i++) g.move(viewerMoves[i]);
    viewerBoard.position(g.fen(), false);
    document.getElementById("moveCounter").textContent = `${viewerIndex} / ${viewerMoves.length}`;
    document.querySelectorAll(".move-pill[data-idx]").forEach(el => {
      el.classList.toggle("active", parseInt(el.dataset.idx) === viewerIndex);
    });
  }

  function buildMoveList() {
    const el = document.getElementById("moveList");
    el.innerHTML = "";
    for (let i = 0; i < viewerMoves.length; i++) {
      if (i % 2 === 0) {
        const num = document.createElement("span");
        num.className   = "move-pill move-num";
        num.textContent = `${Math.floor(i / 2) + 1}.`;
        el.appendChild(num);
      }
      const pill = document.createElement("span");
      pill.className   = "move-pill";
      pill.dataset.idx = i + 1;
      pill.textContent = viewerMoves[i];
      pill.onclick     = () => goToMove(i + 1);
      el.appendChild(pill);
    }
  }

  document.getElementById("btnFirst").onclick   = () => goToMove(0);
  document.getElementById("btnPrev").onclick    = () => goToMove(viewerIndex - 1);
  document.getElementById("btnNext").onclick    = () => goToMove(viewerIndex + 1);
  document.getElementById("btnLast").onclick    = () => goToMove(viewerMoves.length);
  document.getElementById("modalClose").onclick = () => {
    document.getElementById("gameViewModal").classList.add("hidden");
    if (viewerBoard) { viewerBoard.destroy(); viewerBoard = null; }
  };
  document.getElementById("gameViewModal").onclick = e => {
    if (e.target === e.currentTarget) document.getElementById("modalClose").click();
  };
  document.addEventListener("keydown", e => {
    if (document.getElementById("gameViewModal").classList.contains("hidden")) return;
    if (e.key === "ArrowLeft")  goToMove(viewerIndex - 1);
    if (e.key === "ArrowRight") goToMove(viewerIndex + 1);
    if (e.key === "Escape")     document.getElementById("modalClose").click();
  });

  // ── Friends ─────────────────────────────────────────────────────────────────
  async function loadFriends(uid, friends) {
    const listEl = document.getElementById("friendsList");
    listEl.innerHTML = "";

    const reqSnap  = await get(ref(db, `users/${uid}/friendRequests`));
    const requests = reqSnap.val() || {};

    for (const [fromUid, data] of Object.entries(requests)) {
      const item = document.createElement("div");
      item.className = "request-item";
      item.innerHTML = `
        <div class="request-label">📨 Request from ${data.username}</div>
        <div class="request-actions">
          <button class="btn-accept" data-uid="${fromUid}">Accept</button>
          <button class="btn-decline" data-uid="${fromUid}">Decline</button>
        </div>
      `;
      item.querySelector(".btn-accept").onclick = async () => {
        await set(ref(db, `users/${uid}/friends/${fromUid}`), true);
        await set(ref(db, `users/${fromUid}/friends/${uid}`), true);
        await set(ref(db, `users/${uid}/friendRequests/${fromUid}`), null);
        const freshSnap = await get(ref(db, `users/${uid}/friends`));
        loadFriends(uid, freshSnap.val() || {});
      };
      item.querySelector(".btn-decline").onclick = async () => {
        await set(ref(db, `users/${uid}/friendRequests/${fromUid}`), null);
        const freshSnap = await get(ref(db, `users/${uid}/friends`));
        loadFriends(uid, freshSnap.val() || {});
      };
      listEl.appendChild(item);
    }

    const uids = Object.keys(friends);
    if (uids.length === 0 && Object.keys(requests).length === 0) {
      listEl.innerHTML = `<div style="font-size:12px;color:var(--muted);padding:4px 0;">No friends yet.</div>`;
      return;
    }

    for (const fUid of uids) {
      const [nameSnap, ratingSnap] = await Promise.all([
        get(ref(db, `users/${fUid}/username`)),
        get(ref(db, `users/${fUid}/rating`)),
      ]);
      const fname   = nameSnap.val()   || "Unknown";
      const fRating = ratingSnap.val() ?? 800;
      const item    = document.createElement("div");
      item.className = "friend-item";
      item.title     = `View ${fname}'s profile`;
      item.innerHTML = `
        <div class="friend-avatar">${fname[0].toUpperCase()}</div>
        <div>
          <div class="friend-name">${fname}</div>
          <div class="friend-rating">${fRating}</div>
        </div>
      `;
      item.onclick = () => {
        window.location.href = `profile.html?user=${encodeURIComponent(fname)}`;
      };
      listEl.appendChild(item);
    }
  }

  // ── Add friend ──────────────────────────────────────────────────────────────
  function setupAddFriend(myUid, myUsername) {
    document.getElementById("addFriendBtn").onclick = async () => {
      const input          = document.getElementById("friendInput");
      const msgEl          = document.getElementById("friendMsg");
      const targetUsername = input.value.trim();
      msgEl.textContent    = "";
      if (!targetUsername) return;

      const snap = await get(ref(db, `usernames/${targetUsername.toLowerCase()}`));
      if (!snap.exists()) { msgEl.textContent = "User not found."; msgEl.style.color = "#e05c5c"; return; }

      const friendUid = snap.val();
      if (friendUid === myUid) { msgEl.textContent = "That's you!"; msgEl.style.color = "#e05c5c"; return; }

      const alreadyFriend = await get(ref(db, `users/${myUid}/friends/${friendUid}`));
      if (alreadyFriend.exists()) { msgEl.textContent = "Already friends."; msgEl.style.color = "#e05c5c"; return; }

      const alreadySent = await get(ref(db, `users/${friendUid}/friendRequests/${myUid}`));
      if (alreadySent.exists()) { msgEl.textContent = "Request already sent."; msgEl.style.color = "#e05c5c"; return; }

      await set(ref(db, `users/${friendUid}/friendRequests/${myUid}`), {
        username: myUsername,
        sentAt: Date.now(),
      });

      input.value       = "";
      msgEl.textContent = `Request sent to ${targetUsername}!`;
      msgEl.style.color = "#4caf7d";
    };
  }
</script>
