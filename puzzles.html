<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FaithChess — Puzzles</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
</head>
<body>

<div id="puzzle-popup" class="hidden">
  <div class="popup-box">
    <h3 id="puzzle-title">❌ Wrong Move</h3>
    <p id="puzzle-desc">That move doesn't solve the puzzle.</p>
    <div class="popup-actions">
      <button id="retryBtn">Retry</button>
      <button id="exitBtn">Exit</button>
      <button id="viewSolutionBtn">Show Solution</button>
    </div>
  </div>
</div>

<header></header>

<main>
<section class="hero">
  <h1>Practice With Puzzles</h1>
  <p>Patterns. Strategies. Tactics. Sharpen your skills.</p>
</section>
<section class="section">
  <div class="puzzle-layout">
    <div class="board-wrapper">
      <div id="board"></div>
    </div>
    <div id="puzzle-panel">
      <div class="panel-box">
        <div class="panel-title">♟ Puzzle Info</div>
        <div class="panel-row">
          <span>Side to move</span>
          <b id="sideToMove">-</b>
        </div>
        <div class="panel-row">
          <span>Streak</span>
          <b id="streakCount">0</b>
        </div>
      </div>
    </div>
  </div>
</section>
</main>

<footer>© 2026 FaithChess — Built for everyone</footer>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
<script type="module" src="auth.js"></script>
<script src="settings.js"></script>
<script src="puzzles.js"></script>
<script src="nav.js"></script>
</body>
</html>
