<head>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

<body>

    <div id="puzzle-popup" class="hidden">
  <div class="popup-box">
    <h3>❌ Wrong Move</h3>
    <p>That move doesn’t solve the puzzle.</p>

    <div class="popup-actions">
  <button id="retryBtn">Retry</button>
  <button id="exitBtn">Exit</button>
  <button id="solutionBtn">Show Solution</button>
</div>
  </div>
</div>

<header>
  <div class="logo">♟ FaithChess</div>
  <div class="nav">
    <div class="nav-item" onclick="window.location.href='index.html';">Home</div>
    <div class="nav-item" onclick="window.location.href='play.html';">Play</div>
    <div class="nav-item active" onclick="window.location.href='puzzles.html';">Puzzles</div>
    <div class="nav-item" onclick="window.location.href='watch.html';">Watch</div>
    <div class="nav-item" onclick="window.location.href='theory.html';">Theory</div>
  </div>
</header>

<main>

<section class="hero">
  <h1>Practice With Puzzles</h1>
  <p>Patterns. Strategies. Tactics. Sharpen your skills.</p>
</section>

<section class="section">
  <div class="puzzle-layout">

    <div class="board-wrapper">
      <div id="board"></div>
    </div>

    <div id="puzzle-panel">
      <div class="panel-box">

        <div class="panel-title">♟ Puzzle Info</div>

        <div class="panel-row">
          <span>Side to move</span>
          <b id="sideToMove">-</b>
        </div>

        <div class="panel-row">
          <span>Streak</span>
          <b id="streakCount">0</b>
        </div>

      </div>
    </div>

  </div>
</section>

</main>

<footer>
  © 2026 FaithChess — Built for everyone
</footer>
