<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FaithChess — Watch</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
</head>
<body>

<header></header>

<main>
<section class="hero">
  <h1>The Masters Play Here</h1>
  <p>Watch Brilliancy. Learn from the best.</p>
</section>
<section class="section">
  <div class="board-grid">
    <div class="board-wrap">
      <div class="board-label">Lichess Bullet TV</div>
      <div class="player-bar top" id="board1-black">⚫ Black</div>
      <div id="board1"></div>
      <div class="player-bar bottom" id="board1-white">⚪ White</div>
    </div>
    <div class="board-wrap">
      <div class="board-label">Lichess Blitz TV</div>
      <div class="player-bar top" id="board2-black">⚫ Black</div>
      <div id="board2"></div>
      <div class="player-bar bottom" id="board2-white">⚪ White</div>
    </div>
    <div class="board-wrap">
      <div class="board-label">Lichess Rapid TV</div>
      <div class="player-bar top" id="board3-black">⚫ Black</div>
      <div id="board3"></div>
      <div class="player-bar bottom" id="board3-white">⚪ White</div>
    </div>
    <div class="board-wrap">
      <div class="board-label">Lichess Classical TV</div>
      <div class="player-bar top" id="board4-black">⚫ Black</div>
      <div id="board4"></div>
      <div class="player-bar bottom" id="board4-white">⚪ White</div>
    </div>
  </div>
</section>
</main>

<footer>© 2026 FaithChess — Built for everyone</footer>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
<script type="module" src="auth.js"></script>
<script src="grid.js"></script>
<script src="nav.js"></script>

</body>
</html>
